app = "whatsflow"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"
  WHATSFLOW_WORKER_PORT = "3101"
  WHATSFLOW_WORKER_URL = "http://127.0.0.1:3101"
  SESSIONS_DIR = "/app/sessions"

[[mounts]]
  source = "whatsflow_sessions"
  destination = "/app/sessions"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
